name: 构建并发布 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 取出代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 设置版本号（去掉 v 前缀）
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: 还原依赖
        run: dotnet restore

      - name: 发布自包含单文件
        run: |
          dotnet publish -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -p:FileVersion=${{ steps.version.outputs.VERSION }} `
            -p:Product=debit `
            -p:Company=classronin `
            -p:Copyright="Copyright (c) classronin" `
            -o ./publish

      - name: 打包为 ZIP
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ./debit.zip

      - name: 创建 Release 并上传资产
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: 见提交历史
          files: ./debit.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}