name: Upload Release Asset

on:
  release:
    types: [published]

jobs:
  upload-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload debit.7z to Release
        uses: softprops/action-gh-release@v2
        with:
          files: debit.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}